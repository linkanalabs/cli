version: 2

project_name: lk

before:
  hooks:
    - go mod tidy

builds:
  - id: lk
    main: ./cmd/lk
    binary: lk
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: default
    ids: [lk]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - README.md
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  use: github-native

homebrew_casks:
  - name: lk
    repository:
      owner: linkanalabs
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/linkanalabs/cli"
    description: "Linkana CLI — parametrização programática de buyers"
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    # Binário não assinado: remove o quarantine xattr pro Gatekeeper não bloquear.
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/lk"]
          end

release:
  prerelease: auto
